<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a1b8a" />
  <title>BS META — актуальный анализ Brawl Stars</title>
  <link rel="preconnect" href="https://cdn.brawlify.com" />
  <link rel="preconnect" href="https://api.brawlify.com" />
  <link rel="preconnect" href="https://api.brawlapi.com" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-view="main">

  <!-- ================= MAIN VIEW: сетка пинов ================= -->
  <main id="mainView" class="view view-main">
    <header class="topbar">
      <div class="creator-boost-top" title="Используй код в магазине Brawl Stars">
        <span class="cc-label">CONTENT CREATOR BOOST</span>
        <span class="cc-code">Goshakotanov</span>
      </div>

      <h1 class="logo">
        <span class="logo-shadow">BS META</span>
        <span class="logo-sub">Актуальный анализ сезона</span>
      </h1>

      <button id="refreshBtn" class="bs-btn refresh"><span>ОБНОВИТЬ</span></button>
    </header>

    <div id="brawlerGrid" class="brawler-grid">
      <div class="loading">Загружаем бойцов…</div>
    </div>

    <footer class="foot">
      Данные: brawlify.com · brawlapi.com · Тиры обновляются по балансным патчам.
    </footer>
  </main>

  <!-- ================= BRAWLER VIEW: карточка ================= -->
  <section id="brawlerView" class="view view-brawler" aria-hidden="true">
    <button id="backBtn" class="back-btn" aria-label="Назад">
      <span>←</span>
    </button>
    <div id="brawlerCard" class="brawler-card"><!-- заполняется JS --></div>
  </section>

  <script src="app.js"></script>
</body>
</html>
